version: '3.7'

services:
  db:
    image: postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
  dj:
    build: ./dj
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./dj/code:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
